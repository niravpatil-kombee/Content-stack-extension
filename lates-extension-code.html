<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Dynamic Code Picker</title>
  <script src="https://unpkg.com/@contentstack/ui-extensions-sdk@2.2.0/dist/ui-extension-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 10px; }
    .search-wrapper { display: flex; flex-wrap: wrap; align-items: center; border: 1px solid #ddd; border-radius: 4px; padding: 5px; min-height: 40px; cursor: text; }
    .search-wrapper input { border: none; outline: none; flex: 1; padding: 6px; min-width: 150px; font-size: 14px; }
    #chips-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 20px; }
    .tag { background: #eef6ff; border: 1px solid #3399ff; border-radius: 16px; padding: 4px 8px; display: inline-flex; align-items: center; font-size: 13px; }
    .remove { margin-left: 6px; cursor: pointer; color: red; font-weight: bold; }
    ul { list-style: none; padding: 0; margin-top: 4px; max-height: 150px; overflow-y: auto; border-radius: 4px; }
    ul.has-results { border: 1px solid #ddd; }
    li { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
    li:hover { background: #f0f0f0; }
    .status-message { color: #d9534f; margin-top: 10px; white-space: pre-line; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .table-header-wrapper { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .refresh-button { background: #3399ff; border: none; border-radius: 4px; color: white; cursor: pointer; padding: 6px 12px; font-size: 14px; }
    #loader { text-align: center; margin: 6px; display: none; }
  </style>
</head>
<body>
  <div class="search-wrapper" id="search-wrapper">
    <input type="text" id="search" placeholder="Search..." />
  </div>
  <div id="chips-container"></div>
  <ul id="results"></ul>
  <div id="loader"></div>
  <div id="status-message" class="status-message"></div>
  <div id="selected-table"></div>

  <script>
    const CONSTANTS = {
      SEARCH_DEBOUNCE_MS: 300,
      DEFAULT_PER_PAGE: 10,
      SCROLL_THRESHOLD: 10
    };

    const state = {
      extension: null,
      config: {},
      isProductField: false,
      isCustomerField: false,
      isLocationField: false,
      apiUrl: "",
      encodedAuth: "",
      selectedValues: [],
      latestProductsCache: [],
      resultsCache: [],
      isLoading: false,
      lastQuery: "",
      currentPage: 1,
      totalResults: 0,
      perPage: CONSTANTS.DEFAULT_PER_PAGE,
      searchDebounceTimer: null,
      abortController: null,
      shouldShowResults: true
    };

    const elements = {
      statusMessage: null,
      searchInput: null,
      resultsList: null,
      chipsContainer: null,
      selectedTableDiv: null,
      searchWrapper: null,
      loader: null
    };

    const utils = {
      normalizeToArray(val) {
        if (!val) return [];
        return Array.isArray(val) ? val : [val];
      },
      generateAuthToken(token) {
        const today = new Date();
        const dateStr = `${String(today.getUTCDate()).padStart(2, "0")}${String(today.getUTCMonth() + 1).padStart(2, "0")}${today.getUTCFullYear()}`;
        return btoa(`${token}${dateStr}`);
      },
      updateHeight() {
        if (state.extension) state.extension.window.updateHeight();
      },
      closeSearchDropdown() {
        clearTimeout(state.searchDebounceTimer);
        if (state.abortController) state.abortController.abort();
        state.shouldShowResults = false;
        elements.searchInput.value = "";
        elements.resultsList.innerHTML = "";
        elements.resultsList.classList.remove("has-results");
        state.currentPage = 1;
      },
      getSelectedLocation() {
        try {
          return state.extension?.entry?._changedData?.location || [];
        } catch (err) { return []; }
      }
    };

    const dataManager = {
      async restoreSavedData() {
        const saved = await state.extension.field.getData();
        if (!Array.isArray(saved) || saved.length === 0) return;
        state.selectedValues = (typeof saved[0] === "object") ? saved.map(i => i.sku || i.code) : saved;
        if (state.isProductField) state.latestProductsCache = saved;
      },
      async saveData(data) {
        await state.extension.field.setData(data);
        utils.updateHeight();
      },
      async removeItem(index) {
        const value = state.selectedValues[index];
        state.selectedValues.splice(index, 1);
        if (state.isProductField) {
          state.latestProductsCache = state.latestProductsCache.filter(p => p.sku !== value);
          await this.saveData(state.latestProductsCache);
          renderer.renderSelectedTable();
        } else {
          await this.saveData(state.selectedValues);
          renderer.renderChips();
        }
      }
    };

    const api = {
      async fetchResults(query, page = 1, append = false) {
        if (state.isLoading) return;
        if (state.abortController) state.abortController.abort();
        state.abortController = new AbortController();
        
        state.isLoading = true;
        elements.loader.style.display = "block";
        
        const param = state.isProductField ? "sku" : "code";
        const url = `${state.apiUrl}?${param}=${encodeURIComponent(query)}&currentPage=${page}&perPage=${state.perPage}`;
        
        try {
          const res = await fetch(url, { 
            headers: { Authorization: state.encodedAuth }, 
            signal: state.abortController.signal 
          });
          const data = await res.json();
          
          if (state.shouldShowResults && data.success) {
            state.currentPage = page;
            state.totalResults = data.total || 0;
            state.resultsCache = append ? [...state.resultsCache, ...data.data] : data.data;
            renderer.renderSearchResults(state.resultsCache);
          }
        } catch (e) { 
          if (e.name !== 'AbortError') console.error(e); 
        } finally { 
          state.isLoading = false; 
          elements.loader.style.display = "none"; 
        }
      }
    };

    const renderer = {
      renderSearchResults(data = []) {
        elements.resultsList.innerHTML = "";
        elements.resultsList.classList.toggle("has-results", data.length > 0);
        data.forEach(item => {
          const li = document.createElement("li");
          
          let dropdownDisplay;
          if (state.isProductField) {
            dropdownDisplay = item.sku;
          } else if (state.isCustomerField) {
            // FORMAT: code [name] for dropdown list
            dropdownDisplay = `${item.code} [${item.name || 'N/A'}]`;
          } else if (state.config.field_type === "category") {
            dropdownDisplay = item.name || item.code;
          } else {
            dropdownDisplay = item.code;
          }
          
          li.innerText = dropdownDisplay;
          li.onclick = () => this.handleSelection(item);
          elements.resultsList.appendChild(li);
        });
        utils.updateHeight();
      },
      async handleSelection(item) {
        // Selection only saves the 'code' or 'sku' string
        const val = state.isProductField ? item.sku : item.code;
        if (state.selectedValues.includes(val)) return utils.closeSearchDropdown();
        
        state.selectedValues.push(val);
        if (state.isProductField) {
          state.latestProductsCache.push(item);
          await dataManager.saveData(state.latestProductsCache);
          this.renderSelectedTable();
        } else {
          await dataManager.saveData(state.selectedValues);
          renderer.renderChips();
        }
        utils.closeSearchDropdown();
      },
      renderChips() {
        elements.chipsContainer.innerHTML = "";
        state.selectedValues.forEach((v, i) => {
          const chip = document.createElement("div");
          chip.className = "tag";
          // Chips only show the code
          chip.innerHTML = `${v} <span class="remove" onclick="dataManager.removeItem(${i})">×</span>`;
          elements.chipsContainer.appendChild(chip);
        });
        utils.updateHeight();
      },
      renderSelectedTable() {
        elements.selectedTableDiv.innerHTML = "";
        if (!state.isProductField || state.selectedValues.length === 0) return;
        
        const loc = utils.normalizeToArray(utils.getSelectedLocation());
        let html = `<div class="table-header-wrapper"><h3>Selected Products</h3><button class="refresh-button" onclick="renderer.renderSelectedTable()">Refresh</button></div>`;
        html += `<table><tr><th>Order</th><th>Product</th><th>Not Available At</th><th>Action</th></tr>`;
        
        state.selectedValues.forEach((sku, i) => {
          const product = state.latestProductsCache.find(p => p.sku === sku);
          const productLocs = product ? utils.normalizeToArray(product.locations) : [];
          const unavailable = loc.filter(l => !productLocs.includes(l));
          const color = unavailable.length > 0 ? 'red' : 'inherit';
          
          html += `<tr>
            <td>${i+1}</td>
            <td style="color:${color}">${sku}</td>
            <td>${unavailable.join(', ')}</td>
            <td><span style="color:red;cursor:pointer" onclick="dataManager.removeItem(${i})">Remove</span></td>
          </tr>`;
        });
        elements.selectedTableDiv.innerHTML = html + `</table>`;
        utils.updateHeight();
      }
    };

    const eventHandlers = {
      initSearchInput() {
        elements.searchInput.addEventListener("input", () => {
          const query = elements.searchInput.value.toLowerCase().trim();
          elements.resultsList.innerHTML = "";
          elements.statusMessage.innerText = "";
          clearTimeout(state.searchDebounceTimer);
          
          if (!query) return (state.shouldShowResults = true);
          
          if (state.isCustomerField && query.length < 2) {
            elements.statusMessage.innerText = "Minimum 2 characters for customers.";
            return utils.updateHeight();
          }
          if (state.isProductField && query.length < 4) {
            elements.statusMessage.innerText = "Minimum 4 characters for products.";
            return utils.updateHeight();
          }
          
          state.shouldShowResults = true;
          state.searchDebounceTimer = setTimeout(() => {
            state.lastQuery = query;
            api.fetchResults(query, 1, false);
          }, CONSTANTS.SEARCH_DEBOUNCE_MS);
        });
      },
      initInfiniteScroll() {
        elements.resultsList.addEventListener("scroll", () => {
          const { scrollTop, clientHeight, scrollHeight } = elements.resultsList;
          if (scrollTop + clientHeight >= scrollHeight - CONSTANTS.SCROLL_THRESHOLD && 
              !state.isLoading && state.resultsCache.length < state.totalResults) {
            api.fetchResults(state.lastQuery, state.currentPage + 1, true);
          }
        });
      },
      initSearchWrapper() {
        elements.searchWrapper.addEventListener("click", () => elements.searchInput.focus());
      }
    };

    ContentstackUIExtension.init().then(ext => {
      state.extension = ext;
      elements.statusMessage = document.getElementById("status-message");
      elements.searchInput = document.getElementById("search");
      elements.resultsList = document.getElementById("results");
      elements.chipsContainer = document.getElementById("chips-container");
      elements.selectedTableDiv = document.getElementById("selected-table");
      elements.loader = document.getElementById("loader");
      elements.searchWrapper = document.getElementById("search-wrapper");
      
      state.config = ext.field.schema.config || {};
      state.apiUrl = state.config.api_url;
      const dName = ext.field.schema.display_name.toLowerCase();
      state.isProductField = dName.includes("product");
      state.isCustomerField = dName.includes("customer");
      state.isLocationField = dName.includes("location");
      state.encodedAuth = utils.generateAuthToken(ext.config.management_token);

      dataManager.restoreSavedData().then(() => {
        renderer.renderChips();
        renderer.renderSelectedTable();
        eventHandlers.initSearchInput();
        eventHandlers.initInfiniteScroll();
        eventHandlers.initSearchWrapper();
        utils.updateHeight();
      });
    });
  </script>
</body>
</html>
